[global]
interval_s = 60
output = "data/readings.csv"
utc = true

[alerts]
enabled = true
require_consecutive = 2
max_emails_per_day = 1

[alerts.email]
smtp_host = "smtp.office365.com"
smtp_port = 587
use_starttls = true
username = "iqm-instruments@phy.cam.ac.uk"
password_env = "LIQMON_SMTP_PASSWORD"
from = "iqm-instruments@phy.cam.ac.uk"
to = [
  "recipient1@cam.ac.uk",
]

[[alerts.rules]]
id = "scm10-temperature-max"
device_id = "scm10-eth"
metric = "temperature"
max = 5.0
unit = "K"

[[alerts.rules]]
id = "hrc110-pressure-range"
device_id = "hrc110-eth"
metric = "pressure"
min = 0.1
max = 0.5
unit = "psi"

[[devices]]
id = "hrc110-eth"
type = "hrc110"
transport = "tcp"
host = "192.168.0.187"
port = 4266
# read_terminators = ["\r\n"]
query = "MEAS? 2"

[[devices]]
id = "scm10-eth"
type = "scm10"
transport = "tcp"
host = "192.168.0.4"
port = 9760

[[devices]]
id = "cpa1114-eth"
type = "cpa1114"
transport = "tcp"
host = "192.168.0.111"
port = 502
# unit_id = 16
