[global]
interval_s = 60
output = "data/readings.csv"
utc = true

[alerts]
enabled = false
require_consecutive = 2
max_emails_per_day = 1

[alerts.email]
smtp_host = "smtp.cam.ac.uk"
smtp_port = 25
use_starttls = false
# For relay usage, leave username/password_env unset.
# For authenticated SMTP, set both username and password_env.
# username = "your-smtp-user@example.com"
# password_env = "LIQMON_SMTP_PASSWORD"
from = "your-sender@example.com"
to = [
  "your-group@cam.ac.uk",
]

[[alerts.rules]]
id = "scm10-temperature-max"
device_id = "scm10-eth"
metric = "temperature"
max = 5.0
unit = "K"

[[alerts.rules]]
id = "hrc110-pressure-range"
device_id = "hrc110-eth"
metric = "pressure"
min = 0.1
max = 0.5
unit = "psi"

[[devices]]
id = "scm10-serial"
type = "scm10"
transport = "serial"
port = "/dev/ttyUSB2"
baudrate = 9600

[[devices]]
id = "scm10-eth"
type = "scm10"
transport = "tcp"
host = "192.168.0.4"
port = 9760

[[devices]]
id = "hrc110-eth"
type = "hrc110"
transport = "tcp"
host = "192.168.0.187"
port = 4266
# read_terminators = ["\r\n"]
query = "MEAS? 2"

[[devices]]
id = "cpa1114-eth"
type = "cpa1114"
transport = "tcp"
host = "192.168.0.111"
port = 502
# unit_id = 16

# Liquid helium level meter readout. This logical device controls both the
# Agilent E3647A PSU and the Keithley 2000 DMM over separate serial adapters.
[[devices]]
id = "helium-level"
type = "helium_level"
transport = "serial"
measurement_interval_s = 3600
heater_enabled = true
total_sensor_length_cm = 140.0
normal_state_linear_resistivity_ohm_per_cm = 0.436
psu_port = "/dev/cu.usbserial-PSU"
dmm_port = "/dev/cu.usbserial-DMM"
psu_baudrate = 9600
psu_rtscts = false
psu dsrdtr = false
psu_write_terminator = "\r\n"
dmm_baudrate = 9600
# Optional if the Keithley serial output terminator differs from the default.
# dmm_read_terminators = ["\r\n", "\n", "\r"]
psu_channel = "OUT1"
psu_voltage_limit_v = 10.0
psu_current_limit_a = 0.1
dmm_range_ohm = 100.0
dmm_nplc = 100.0
resistance_readings = 3
reading_delay_s = 0.1
output_settle_s = 30
